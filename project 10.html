<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register</p>
    <hr>

    <form">
    <h2>Personal Details</h2>

    <label for="name">First Name:</label>
    <input type=" text" name="name" id="name" placeholder="e.g.Siddhi">
    <br><br>

    <label for="surname">Last Name:</label>
    <input type="text" name="surname" id="surname" placeholder="e.g.Sehgal">
    <br><br>

    
    <label for="dob">DOB:</label>
    <input type="date" name="dob" id="dob">
    <br><br>

    <label for="gender">Gender</label>

    <br><br>
    
    <label for="male">Male</label>
    <input type="radio" name="gender" id="male" value="male">
    <br><br>

      <label for="female">Female</label>
    <input type="radio" name="gender" id="female" value="female">
    <br><br>

    <label for="other">Other</label>
    <input type="radio" name="gender" id="other" value="other">
    <br><br>

      <h3>Upload Your Photo</h3>
      <input type="file" name="file">

      <hr>

      <h2>Contact Information</h2>

      <label for="email ">Email Address:</label>
    <input type="email" name="email" id="email" placeholder="you@example.com">
    <br><br>

    <label for="phone"> Phone Numer:</label>
    <input type="tel" name="phone" id="phone" placeholder="e.g.9876543210">
    <br><br>

    <label for="address">Malling Address:</label>
    <br>
    <textarea name="addresss" id="address" rows="5" cols="5"></textarea>


    <hr>

    <h2>Acedamic Information</h2>

     <label for="course">Select Your Course:</label>
     <select name="course" id="course">
        <option value="CSS">CSS</option>
        <option value="ME">ME</option>
        <option value="CE">CE</option>
     </select>


     <hr>

     <button submit>Register</button>
     <button reset>clear form</button>
    



    


    </form>
</body>
</html>
